<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;

    padding:20px;
}

/* Gambar materi */
.materi-img{
    max-width:95%;
    max-height:80vh;

    border-radius:20px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.25);
}

/* Tombol kembali */
.back-btn{
    margin-top:25px;

    padding:15px 40px;

    border:none;
    border-radius:15px;

    cursor:pointer;

    font-size:22px;
    font-weight:bold;
    color:white;

    background:
        linear-gradient(
            to bottom,
            #ff9f43,
            #ff7b00,
            #d95f00
        );

    box-shadow:
        0 6px 0 #8a3a00,
        0 0 15px rgba(255,140,0,.5);

    transition:.2s;
}

.back-btn:hover{
    transform:scale(1.05);
}

.back-btn:active{
    transform:translateY(3px);
}

@media(max-width:768px){

    .materi-img{
        max-width:100%;
        max-height:70vh;
    }

    .back-btn{
        font-size:18px;
        padding:12px 30px;
    }
}
</style>
</head>
<body>

<img
    src="materi.jpeg"
    alt="Materi"
    class="materi-img"
>

<button
    class="back-btn"
    onclick="window.location.href='sub.html';"
>
    ⬅ Kembali
</button>

</body>
</html>
