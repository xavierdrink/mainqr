<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main Menu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      background:url('background.jpg') center center/cover no-repeat;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* =========================
       CARD KIRI & KANAN
    ========================= */
    .side-card{
      position:absolute;
      top:50%;
      transform:translateY(-50%);

      width:200px;
      height:250px;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-decoration:none;
      color:white;

      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(12px);

      border:2px solid rgba(255,255,255,0.2);
      border-radius:25px;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.35);

      transition:.3s ease;

      z-index:5;
    }

    .side-card:hover{
      transform:translateY(-50%) scale(1.08);

      box-shadow:
        0 0 25px rgba(255,255,255,0.5),
        0 10px 25px rgba(0,0,0,0.35);
    }

    .side-card .icon{
      font-size:70px;
      margin-bottom:15px;
    }
    /* CARD DASAR */
.side-card{
  position:absolute;
  top:50%;
  transform:translateY(-50%);

  width:220px;
  height:260px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-decoration:none;
  color:white;

  border-radius:30px;

  border:4px solid rgba(255,255,255,.4);

  box-shadow:
    0 10px 0 rgba(0,0,0,.25),
    0 0 25px rgba(255,255,255,.25);

  transition:.3s ease;
}

.side-card:hover{
  transform:translateY(-50%) scale(1.08);
}

.side-card .icon{
  font-size:80px;
  margin-bottom:15px;
}

.side-card .title{
  font-size:28px;
  font-weight:900;
  text-align:center;
  text-shadow:2px 2px 5px rgba(0,0,0,.3);
}

/* CARD MATERI */
.left-card{
  left:40px;

  background:
    linear-gradient(
      180deg,
      #4fc3f7 0%,
      #2196f3 50%,
      #1565c0 100%
    );
}

/* CARD PETUNJUK */
.right-card{
  right:40px;

  background:
    linear-gradient(
      180deg,
      #66bb6a 0%,
      #43a047 50%,
      #1b5e20 100%
    );
}

/* Glow saat hover */
.left-card:hover{
  box-shadow:
    0 10px 0 #0d47a1,
    0 0 40px rgba(33,150,243,.8);
}

.right-card:hover{
  box-shadow:
    0 10px 0 #1b5e20,
    0 0 40px rgba(76,175,80,.8);
}

    .side-card .title{
      font-size:24px;
      font-weight:bold;
      text-align:center;
      line-height:1.3;
    }

    .left-card{
      left:40px;
    }

    .right-card{
      right:40px;
    }

    /* =========================
       MENU TENGAH
    ========================= */
    .menu-container{
      position:relative;
      z-index:2;

      display:flex;
      flex-direction:row;
      gap:50px;

      justify-content:center;
      align-items:center;

      flex-wrap:wrap;
    }

    .menu-link{
      display:block;
    }

    .menu-btn{
      width:220px;
      cursor:pointer;
      display:block;

      transition:0.25s ease;

      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.3))
        drop-shadow(0 0 20px rgba(0,0,0,0.5));
    }

    .menu-btn:hover{
      transform:scale(1.08) translateY(-8px);

      filter:
        drop-shadow(0 0 18px rgba(255,255,255,0.6))
        drop-shadow(0 0 25px rgba(0,255,255,0.5));
    }

    .menu-btn:active{
      transform:scale(0.96);
    }

    /* =========================
       TOMBOL KEMBALI
    ========================= */
    .back-btn{
      position:absolute;
      bottom:35px;
      left:50%;
      transform:translateX(-50%);

      z-index:5;

      padding:16px 55px;

      font-size:28px;
      font-weight:bold;
      color:white;

      border:none;
      border-radius:18px;

      cursor:pointer;

      background:
        linear-gradient(
          to bottom,
          #ff9f43 0%,
          #ff7b00 45%,
          #d95f00 100%
        );

      box-shadow:
        0 6px 0 #8a3a00,
        0 0 18px rgba(255,140,0,0.6),
        inset 0 4px 8px rgba(255,255,255,0.4);

      text-shadow:
        0 2px 5px rgba(0,0,0,0.4);

      transition:0.18s ease;
    }

    .back-btn:hover{
      transform:
        translateX(-50%)
        scale(1.08);
    }

    .back-btn:active{
      transform:
        translateX(-50%)
        translateY(4px);
    }

    /* =========================
       RESPONSIVE
    ========================= */
    @media(max-width:1200px){

      .side-card{
        width:160px;
        height:210px;
      }

      .side-card .icon{
        font-size:55px;
      }

      .side-card .title{
        font-size:20px;
      }
    }

    @media(max-width:900px){

      .menu-btn{
        width:170px;
      }

      .menu-container{
        gap:25px;
      }

      .side-card{
        position:static;
        transform:none;

        width:180px;
        height:180px;
      }

      .side-card:hover{
        transform:scale(1.05);
      }

      body{
        flex-direction:column;
        gap:20px;
      }
    }

    @media(max-width:600px){

      .menu-container{
        flex-direction:column;
      }

      .menu-btn{
        width:190px;
      }

      .back-btn{
        font-size:22px;
        padding:14px 40px;
      }

      .side-card{
        width:150px;
        height:150px;
      }

      .side-card .icon{
        font-size:45px;
      }

      .side-card .title{
        font-size:18px;
      }
    }
  </style>
</head>
<body>

  

  <!-- MENU TENGAH -->
  <div class="menu-container">

    <a
      href="https://xavierdrink.github.io/1/"
      class="menu-link"
    >
      <img
        src="6.jpeg"
        class="menu-btn"
        alt="Story 1"
      />
    </a>

    <a
      href="https://xavierdrink.github.io/2/"
      class="menu-link"
    >
      <img
        src="7.jpeg"
        class="menu-btn"
        alt="Story 2"
      />
    </a>

    <a
      href="https://xavierdrink.github.io/3/"
      class="menu-link"
    >
      <img
        src="8.jpeg"
        class="menu-btn"
        alt="Story 3"
      />
    </a>

  </div>

  <!-- CARD KANAN -->


  <!-- TOMBOL KEMBALI -->
  <button
    class="back-btn"
    onclick="window.location.href='sub.html';"
  >
    ⬅ Kembali
  </button>

</body>
</html>
