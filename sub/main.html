<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Menu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      background:url('background.jpg') center center/cover no-repeat;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* Container tombol */
    .menu-container{
      position:relative;
      z-index:2;

      display:flex;
      flex-direction:row;
      gap:50px;

      justify-content:center;
      align-items:center;

      flex-wrap:wrap;
    }

    /* Tombol gambar */
    .menu-btn{
      width:220px;
      cursor:pointer;

      transition:0.25s ease;

      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.3))
        drop-shadow(0 0 20px rgba(0,0,0,0.5));
    }

    .menu-btn:hover{
      transform:scale(1.08) translateY(-8px);

      filter:
        drop-shadow(0 0 18px rgba(255,255,255,0.6))
        drop-shadow(0 0 25px rgba(0,255,255,0.5));
    }

    .menu-btn:active{
      transform:scale(0.96);
    }

    /* Tombol Back Style Game */
    .back-btn{
      position:absolute;
      bottom:35px;
      left:50%;
      transform:translateX(-50%);

      z-index:5;

      padding:16px 55px;

      font-size:28px;
      font-weight:bold;
      color:white;

      border:none;
      border-radius:18px;

      cursor:pointer;

      background:
        linear-gradient(
          to bottom,
          #ff9f43 0%,
          #ff7b00 45%,
          #d95f00 100%
        );

      box-shadow:
        0 6px 0 #8a3a00,
        0 0 18px rgba(255,140,0,0.6),
        inset 0 4px 8px rgba(255,255,255,0.4);

      text-shadow:
        0 2px 5px rgba(0,0,0,0.4);

      transition:0.18s ease;
    }

    /* Efek glossy */
    .back-btn::before{
      content:"";
      position:absolute;

      top:6px;
      left:12px;

      width:75%;
      height:38%;

      border-radius:15px;

      background:rgba(255,255,255,0.35);

      filter:blur(1px);
    }

    .back-btn:hover{
      transform:
        translateX(-50%)
        scale(1.08);

      box-shadow:
        0 6px 0 #8a3a00,
        0 0 28px rgba(255,180,0,0.9),
        inset 0 4px 10px rgba(255,255,255,0.5);
    }

    .back-btn:active{
      transform:
        translateX(-50%)
        translateY(4px);

      box-shadow:
        0 2px 0 #8a3a00,
        0 0 15px rgba(255,140,0,0.5);
    }

    /* Responsive */
    @media(max-width:900px){
      .menu-btn{
        width:170px;
      }

      .menu-container{
        gap:25px;
      }
    }

    @media(max-width:600px){
      .menu-container{
        flex-direction:column;
      }

      .menu-btn{
        width:190px;
      }

      .back-btn{
        font-size:22px;
        padding:14px 40px;
      }
    }

  </style>
</head>
<body>

  <div class="menu-container">

    <!-- Story 1 -->
    <img
      src="3.png"
      class="menu-btn"
      onclick="window.location.href='story1/index.html'"
      alt="Story 1"
    >

    <!-- Story 2 -->
    <img
      src="4.png"
      class="menu-btn"
      onclick="window.location.href='story2/index.html'"
      alt="Story 2"
    >

    <!-- Story 3 -->
    <img
      src="5.png"
      class="menu-btn"
      onclick="window.location.href='story3/index.html'"
      alt="Story 3"
    >

  </div>

  <!-- Tombol Back -->
  <button
    class="back-btn"
    onclick="window.location.href='../index.html'">

    ⬅ Kembali

  </button>

</body>
</html>
